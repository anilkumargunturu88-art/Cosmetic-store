<!DOCTYPE html>
<html>
<head>
    <title>Online Cosmetics Store</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<h1>🌸 Online Cosmetics Store 🌸</h1>

<table>
    <tr>
        <th>Product</th>
        <th>Price</th>
    </tr>

    {% for product in products %}
    <tr>
        <td>{{ product[0] }}</td>
        <td>₹{{ product[1] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
